# Senopati Academy vhost untuk asksenopati.com.
#
# Arsitektur deployment:
#   Browser ‚îÄ‚îÄHTTPS‚îÄ‚îÄ‚ñ∂ Cloudflare Edge ‚îÄ‚îÄtunnel‚îÄ‚îÄ‚ñ∂ cloudflared ‚îÄ‚îÄHTTP‚îÄ‚îÄ‚ñ∂ nginx :80 ‚îÄ‚îÄ‚ñ∂ academy :3003
#
# TLS termination dilakukan Cloudflare; nginx di origin tetap HTTP.
# NEXTAUTH_URL di .env.production.local = https://asksenopati.com agar cookie auth
# bertanda Secure di browser (aman karena jalur browser‚ÜîCloudflare adalah HTTPS).
# X-Forwarded-Proto https di-hardcode supaya Next.js tahu request awal HTTPS dan
# generate URL absolute yang benar (redirect, OG tags, sertifikat link, dsb).
#
# Asset upload MinIO di-proxy via /senopati-media/ agar bisa diserve lewat domain
# publik yang sama (dipakai Next.js Image remote patterns dan presigned URL preview).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name asksenopati.com www.asksenopati.com;

    client_max_body_size 200m;

    # MinIO public bucket untuk asset course/lesson/interactive module.
    location /senopati-media/ {
        proxy_pass http://127.0.0.1:9000/senopati-media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    # Next.js app (academy). Include WebSocket upgrade untuk live class (Milestone 3).
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }
}
